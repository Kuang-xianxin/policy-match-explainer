services:
  postgres:
    image: postgres:16-alpine
    container_name: policy-match-postgres
    environment:
      POSTGRES_USER: policy_user
      POSTGRES_PASSWORD: policy_password
      POSTGRES_DB: policy_match
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - policy_match_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=policy_password psql -U policy_user -d policy_match -c 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  policy_match_pgdata:
